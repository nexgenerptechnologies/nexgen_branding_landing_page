<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Hexagon icon -->
  <polygon points="24,4 40,13 40,31 24,40 8,31 8,13"
           fill="url(#hexGrad)" />
  <!-- N letter inside hexagon -->
  <text x="16" y="30" font-family="Arial,sans-serif" font-weight="bold"
        font-size="20" fill="white">N</text>
  <!-- NexGen text -->
  <text x="50" y="22" font-family="Arial,sans-serif" font-weight="700"
        font-size="16" fill="#4F46E5">NexGen</text>
  <!-- Enterprises sub-text -->
  <text x="50" y="38" font-family="Arial,sans-serif" font-weight="400"
        font-size="10" fill="#6B7280" letter-spacing="2">ENTERPRISES</text>
</svg>
